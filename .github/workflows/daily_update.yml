name: Daily IPL Update

on:
  schedule:
    - cron: '30 18 * * *'  # 00:00 IST midnight (UTC+5:30) = 18:30 UTC — catches same-day evening matches
    - cron: '30 2 * * *'   # 08:00 IST morning — catches any late-night matches / retry
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

jobs:
  update-projections:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Required to push commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-scripts.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-scripts.txt

      - name: Fetch latest match results
        run: python scripts/fetch_results.py

      - name: Update projections and fixtures
        run: python scripts/update_projections.py

      - name: Generate why-changed explanations
        run: python scripts/generate_why_changed.py

      - name: Track model accuracy
        run: python scripts/track_accuracy.py

      - name: Calculate player stats
        run: python scripts/calculate_player_stats.py

      - name: Generate match story
        run: python scripts/generate_match_story.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Generate weekly narrative (Mondays only)
        if: github.event_name == 'schedule' && startsWith(github.event.schedule, '30 2')
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "1" ]; then
            python scripts/generate_weekly_narrative.py
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push if data changed
        run: |
          git config user.name  "Duckworth Bot"
          git config user.email "bot@duckworth.in"
          git add data/results.csv
          git add public/data/projections.json
          git add public/data/fixtures.json
          git add public/data/player_stats.json
          git add public/data/stories.json
          git add public/data/accuracy.json
          git add data/raw/ipl_2026_bbb.csv
          git diff --staged --quiet || \
            git commit -m "auto: update projections + stories + accuracy $(date +'%Y-%m-%d')"
          git push
